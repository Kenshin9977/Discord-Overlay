name: sign-windows self-test

# Temporary. Exercises the composite action exactly the way another repository
# consumes it — by its cross-repo ref, not a local path — because that is the one
# link the release pipeline never covers: whether the action resolves the shared
# signer from its own checkout.
#
# Deliberately signs a PE whose length is NOT a multiple of 8: that is the case
# that silently produced a HashMismatch signature and shipped a broken installer.

on:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: windows-latest
    steps:
      - name: Fetch a test PE and make it 8-misaligned
        shell: bash
        run: |
          curl -fsSL -o probe.exe \
            https://raw.githubusercontent.com/Le-Syl21/ssign/f4fc7d7aca180982a11d9be4ee5aebd394ad5545/ssign-core/tests/fixtures/hello.exe
          printf 'ABCDE' >> probe.exe
          size=$(stat -c%s probe.exe)
          echo "probe.exe: $size bytes (mod 8 = $((size % 8)))"
          if [ $((size % 8)) -eq 0 ]; then
            echo "test is worthless if the file is 8-aligned" >&2
            exit 1
          fi

      - name: Sign it through the action, as an external repo would
        uses: Kenshin9977/Discord-Overlay/.github/actions/sign-windows@sign-windows-v1
        with:
          files: probe.exe
          ssh-host: ${{ secrets.SIGN_SSH_HOST }}
          ssh-key: ${{ secrets.SIGN_SSH_KEY }}
          known-hosts: ${{ secrets.SIGN_SSH_KNOWN_HOSTS }}

      - name: Show what Windows sees
        shell: pwsh
        run: |
          $s = Get-AuthenticodeSignature .\probe.exe
          "Status      : $($s.Status)"
          "Signer      : $($s.SignerCertificate.Subject)"
          "Timestamped : $(if ($s.TimeStamperCertificate) { $s.TimeStamperCertificate.Subject } else { 'NONE' })"
