name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build, pack with vpk, publish GitHub Release
    runs-on: windows-latest

    env:
      # Public cert thumbprint (not a secret — it's in the public cert).
      # Override with the CERTUM_CERT_THUMBPRINT secret if the cert is
      # ever reissued.
      CERT_THUMBPRINT: ${{ secrets.CERTUM_CERT_THUMBPRINT || '80C0A61E3A5E10199070235AE95A9A0DB6971A94' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup .NET 9 SDK (vpk targets net9.0)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error 'Could not resolve version'
            exit 1
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "Releasing version $version"

      - name: Determine code-signing availability
        id: sign
        shell: pwsh
        env:
          CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTUM_OTP_URI)) {
            Write-Warning 'Certum signing secrets not configured — producing UNSIGNED binaries.'
            "enabled=false" >> $env:GITHUB_OUTPUT
            "params=" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output 'Certum signing secrets present — binaries will be signed.'
            "enabled=true" >> $env:GITHUB_OUTPUT
            "params=/fd sha256 /tr http://time.certum.pl /td sha256 /sha1 $env:CERT_THUMBPRINT" >> $env:GITHUB_OUTPUT
          }

      - name: Install SimplySign Desktop
        if: steps.sign.outputs.enabled == 'true'
        shell: pwsh
        run: |
          winget install --id Certum.SmartSignSimplySignDesktop --silent `
            --accept-package-agreements --accept-source-agreements --disable-interactivity
          $exe = Get-ChildItem -Path `
            "$env:ProgramFiles\Certum","${env:ProgramFiles(x86)}\Certum" `
            -Recurse -Filter 'SimplySignDesktop.exe' -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { throw 'SimplySignDesktop.exe not found after install.' }
          "CERTUM_EXE_PATH=$exe" >> $env:GITHUB_ENV
          Write-Output "SimplySign Desktop: $exe"

      - name: Ensure signtool.exe is on PATH
        if: steps.sign.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Recurse -Filter 'signtool.exe' -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw 'signtool.exe not found in the Windows 10 SDK.' }
          Split-Path $signtool.FullName >> $env:GITHUB_PATH
          Write-Output "signtool: $($signtool.FullName)"

      - name: Log in to Certum SimplySign
        if: steps.sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
          CERTUM_USERID: ${{ secrets.CERTUM_USERID }}
          CERTUM_CERT_THUMBPRINT: ${{ env.CERT_THUMBPRINT }}
        run: .\build\Connect-SimplySign.ps1

      - name: Restore local tools (vpk)
        run: dotnet tool restore

      - name: Publish & pack
        shell: pwsh
        run: |
          .\build\publish.ps1 -Pack `
            -PackVersion ${{ steps.version.outputs.version }} `
            -SignParams '${{ steps.sign.outputs.params }}'

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            Releases/Discord-Overlay-win-Setup.exe
            Releases/Discord-Overlay-${{ steps.version.outputs.version }}-full.nupkg
            Releases/Discord-Overlay-win-Portable.zip
            Releases/RELEASES
            Releases/releases.win.json
            Releases/assets.win.json
