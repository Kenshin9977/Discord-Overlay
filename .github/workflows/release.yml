name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build, pack with vpk, publish GitHub Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup .NET 9 SDK (vpk targets net9.0)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error 'Could not resolve version'
            exit 1
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "Releasing version $version"

      - name: Set up remote code-signing
        id: sign
        shell: pwsh
        env:
          SIGN_SSH_HOST: ${{ secrets.SIGN_SSH_HOST }}
          SIGN_SSH_KEY: ${{ secrets.SIGN_SSH_KEY }}
          SIGN_SSH_PORT: ${{ secrets.SIGN_SSH_PORT }}
          SIGN_SSH_KNOWN_HOSTS: ${{ secrets.SIGN_SSH_KNOWN_HOSTS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGN_SSH_HOST) -or
              [string]::IsNullOrWhiteSpace($env:SIGN_SSH_KEY)) {
            Write-Warning 'Remote-signing secrets not configured — producing UNSIGNED binaries.'
            "template=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $keyPath = Join-Path $env:RUNNER_TEMP 'sign_key'
          # Write LF-only and no trailing CRLF — OpenSSH rejects CRLF keys.
          [IO.File]::WriteAllText($keyPath, ($env:SIGN_SSH_KEY -replace "`r`n", "`n"))
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):F" | Out-Null

          "SIGN_SSH_HOST=$($env:SIGN_SSH_HOST)"      >> $env:GITHUB_ENV
          "SIGN_SSH_KEY_FILE=$keyPath"               >> $env:GITHUB_ENV
          if (-not [string]::IsNullOrWhiteSpace($env:SIGN_SSH_PORT)) {
            "SIGN_SSH_PORT=$($env:SIGN_SSH_PORT)"    >> $env:GITHUB_ENV
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SIGN_SSH_KNOWN_HOSTS)) {
            $khPath = Join-Path $env:RUNNER_TEMP 'sign_known_hosts'
            [IO.File]::WriteAllText($khPath, ($env:SIGN_SSH_KNOWN_HOSTS -replace "`r`n", "`n"))
            "SIGN_SSH_KNOWN_HOSTS=$khPath"           >> $env:GITHUB_ENV
          }

          Write-Output 'Remote signing configured — binaries will be signed on the VPS.'
          "template=bash ./build/sign-remote.sh ""{{file}}""" >> $env:GITHUB_OUTPUT

      - name: Restore local tools (vpk)
        run: dotnet tool restore

      - name: Publish & pack
        shell: pwsh
        run: |
          .\build\publish.ps1 -Pack `
            -PackVersion ${{ steps.version.outputs.version }} `
            -SignTemplate '${{ steps.sign.outputs.template }}'

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            Releases/Discord-Overlay-win-Setup.exe
            Releases/Discord-Overlay-${{ steps.version.outputs.version }}-full.nupkg
            Releases/Discord-Overlay-win-Portable.zip
            Releases/RELEASES
            Releases/releases.win.json
            Releases/assets.win.json
